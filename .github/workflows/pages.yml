name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-cloudflare-pages:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin-console/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install dependencies
        working-directory: admin-console
        run: npm ci

      - name: Build admin console
        working-directory: admin-console
        env:
          VITE_APP_STATION_API_URL: https://sinoport.co
          VITE_APP_AGENT_API_URL: https://adonio-sinoport-admin.pages.dev
        run: npm run build

      - name: Publish admin static routes
        run: node scripts/publish-admin-static.mjs

      - name: Prepare site-dist
        run: node scripts/prepare-pages-site.mjs

      - name: Deploy main site to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_PAGES }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy site-dist --project-name adonio-sinoport --branch main --commit-dirty=true

      - name: Deploy admin site to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_PAGES }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy admin-console/dist --project-name adonio-sinoport-admin --branch main --commit-dirty=true
