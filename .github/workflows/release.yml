name: Release

on:
  workflow_dispatch:
    inputs:
      target:
        description: Cloudflare worker environment to deploy
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging
      station_api_url:
        description: Public station API URL used by the Pages build
        required: true
        type: string
      api_url:
        description: Public api-worker URL used by smoke checks
        required: true
        type: string
      agent_url:
        description: Public agent-worker URL used by smoke checks
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: release-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  deploy-pages:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin-console/package-lock.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Install admin console dependencies
        working-directory: admin-console
        run: npm ci

      - name: Build admin console
        working-directory: admin-console
        env:
          VITE_APP_STATION_API_URL: ${{ inputs.station_api_url }}
        run: npm run build

      - name: Publish admin static routes
        run: node scripts/publish-admin-static.mjs

      - name: Prepare Pages artifact
        run: node scripts/prepare-pages-site.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site-dist

  deploy-pages-publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: deploy-pages

    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-workers:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy api-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config apps/api-worker/wrangler.jsonc --env ${{ inputs.target }}

      - name: Deploy agent-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config apps/agent-worker/wrangler.jsonc --env ${{ inputs.target }}

  smoke:
    runs-on: ubuntu-latest
    needs:
      - deploy-pages-publish
      - deploy-workers

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            admin-console/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Release smoke
        env:
          SMOKE_API_URL: ${{ inputs.api_url }}
          SMOKE_AGENT_URL: ${{ inputs.agent_url }}
          SMOKE_WEB_URL: ${{ needs.deploy-pages-publish.outputs.page_url }}
        run: npm run test:frontend:smoke
