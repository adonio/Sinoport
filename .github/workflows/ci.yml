name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-demo:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin-console/package-lock.json

      - name: Install dependencies
        working-directory: admin-console
        run: npm ci

      - name: Verify front-end demo
        working-directory: admin-console
        run: npm run verify:demo
