name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-demo:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            admin-console/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install dependencies
        working-directory: admin-console
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Typecheck workspace
        run: npm run typecheck

      - name: Build admin console
        working-directory: admin-console
        run: npm run build

      - name: Verify front-end demo
        working-directory: admin-console
        run: npm run verify:demo

      - name: Backend integration smoke
        run: npm run test:integration:api

      - name: Agent smoke
        run: npm run test:agent:smoke

      - name: Delivery smoke
        run: npm run test:frontend:smoke
